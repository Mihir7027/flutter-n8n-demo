name: flutter_n8n_demo
description: Flutter + n8n demo app with enterprise architecture
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # DI
  get_it: ^8.0.2

  # Navigation
  go_router: ^14.2.0

  # HTTP
  dio: ^5.4.3

  # Functional programming
  dartz: ^0.10.1

  # Equality
  equatable: ^2.0.5

  # JSON
  json_annotation: ^4.9.0

  # Secure storage
  flutter_secure_storage: ^9.2.2

  # Logging
  logger: ^2.4.0

  # Local storage
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.13
  riverpod_generator: ^2.4.3
  json_serializable: ^6.8.0

  # Testing
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
